name: Auto update CCBR README

on:
  workflow_dispatch:
  schedule:
    - cron: "30 04 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  createreadme:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the main repository
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CCBR_BOT_APP_ID }}
          private-key: ${{ secrets.CCBR_BOT_PRIVATE_KEY }}
          owner: CCBR

      # Step 2: Set up Git for committing later
      - name: Set up Git
        run: |
          git config --global user.name 'CCBR-bot[bot]'
          git config --global user.email '258092125+CCBR-bot[bot]@users.noreply.github.com'

      # Step 3: Pull Docker container for README generation
      - name: Pull Docker
        run: |
          docker pull nciccbr/make_readme:latest

      # Step 4: Run Docker to generate the README file
      - name: Run Docker to make readme
        env:
          GITHUB_TOKEN: ${{ secrets.OMNITOKEN }}
        run: |
          docker run -e GITHUB_TOKEN=$GITHUB_TOKEN -v ${{ github.workspace }}:/workspace -w /workspace nciccbr/make_readme:latest bash ./assets/make_readme/make_readme.sh

      # Step 5: Verify output of README
      - name: verify output
        run: |
          cat profile/README.md

      # Step 6: Commit changes, open a PR, and merge it into main
      - name: Commit changes and auto-merge PR
        run: |
          BRANCH="ci/auto-readme-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add .

          # Skip PR creation when there are no content changes.
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ci: update readme with createreadme github action."
          git push origin "$BRANCH"

          PR_JSON=$(gh api \
            repos/${{ github.repository }}/pulls \
            --method POST \
            -f title='ci: update readme with createreadme github action.' \
            -f head="$BRANCH" \
            -f base='main' \
            -f body='Automated README update from workflow.')

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          gh api \
            repos/${{ github.repository }}/pulls/"$PR_NUMBER"/merge \
            --method PUT \
            -f merge_method='squash' \
            -f commit_title='ci: update readme with createreadme github action.'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      # Step 7: Checkout the CCBR GitHub Pages repository (ccbr.github.io)
      - name: Checkout github.io
        uses: actions/checkout@v4
        with:
          repository: CCBR/ccbr.github.io
          token: ${{ steps.generate-token.outputs.token }} # Personal Access Token (PAT)
          path: ccbr.github.io

      # Step 8: Copy the generated README.md to the index.md of the GitHub Pages repo
      - name: Copy README.md to index.md
        run: |
          cp profile/README.md ccbr.github.io/index.md

      # Step 9: Commit and push the changes to the GitHub Pages repository
      - name: Commit and push to GitHub Pages
        working-directory: ccbr.github.io
        run: |
          git add .
          git commit -m "ci: update index.md with README.md content from main repo."
          git push origin master --force
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
